  <text x="104" y="282" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#00D4C8" letter-spacing="0.1em" text-transform="uppercase">INTERNET IN MYANMAR</text>
  <!-- Tagline -->
  <text x="104" y="330" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#E2E8F0">Independent Monitor</text>
