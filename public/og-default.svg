  <text x="104" y="560" font-family="ui-monospace, monospace" font-size="16" fill="#475569">internetinmyanmar.com</text>
  <!-- Status dot -->
  <circle cx="1100" cy="315" r="60" fill="#00D4C8" fill-opacity="0.08"/>
  <circle cx="1100" cy="315" r="8" fill="#00D4C8"/>
  <circle cx="1100" cy="315" r="16" fill="#00D4C8" fill-opacity="0.3"/>
